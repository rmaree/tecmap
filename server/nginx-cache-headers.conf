# nginx cache headers configuration
# Add this to your server block in /etc/nginx/sites-available/gtfs-cache
# or directly embed if serving tecmap from nginx

# Prevent caching of service worker and version file
# This ensures updates are detected immediately by the browser
location ~ ^/(service-worker\.js|version\.js)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
}

# Never cache HTML
location ~ \.html?$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
}

# Cache static assets for longer periods (1 year)
location ~ \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
}
