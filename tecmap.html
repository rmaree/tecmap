   // Compute the ISO 8601 current week number 
   function getISOWeekNumber(date = new Date()) {
       const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
       d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7)); // first week of the year is the week with the first thursday
       const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
       return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
   }


   function addDays(baseDate, days) {
	 const result = new Date(baseDate);
	 result.setDate(result.getDate() + days);
	 return result;
   }
     
     function isPublicHoliday(date = new Date()) {
	 //Check if the day is a legal public holiday in Belgium e.g. 01/05, 21/07, 25/12,
	 const year = date.getFullYear();
	 const easter = getEasterDate(year);
	 
	 const fixedHolidays = [
	     "01/01", // new year
	     "01/05", // labor day
	     "21/07", // national belgian day
	     "15/08", // assumption
	     "01/11", // all saints
	     "11/11", // armistice
	     "25/12"  // christmas
	 ];
	 const movableHolidays = [
	     easter,                  // easter sunday
	     addDays(easter, 1),      // easter monday
	     addDays(easter, 39),     // ascension
	     addDays(easter, 49),     // pentecost
	     addDays(easter, 50)      // monday pentecost
	 ].map(d => `${String(d.getDate()).padStart(2, "0")}/${String(d.getMonth() + 1).padStart(2, "0")}`);

	 const day = String(date.getDate()).padStart(2, "0");
	 const month = String(date.getMonth() + 1).padStart(2, "0");
	 const dayMonth = `${day}/${month}`;
	 return fixedHolidays.includes(dayMonth) || movableHolidays.includes(dayMonth);
     }

     function getEasterDate(y) { // Butcher's algorithm for determining the date of Easter
	 const f = Math.floor;
	 const a = y % 19;
	 const b = f(y / 100);
	 const c = y % 100;
	 const d = f(b / 4);
	 const e = b % 4;
	 const f1 = f((b + 8) / 25);
	 const g = f((b - f1 + 1) / 3);
	 const h = (19 * a + b - d - g + 15) % 30;
	 const i = f(c / 4);
	 const k = c % 4;
	 const l = (32 + 2 * e + 2 * i - h - k) % 7;
	 const m = f((a + 11 * h + 22 * l) / 451);
	 const month = f((h + l - 7 * m + 114) / 31);
	 const day = ((h + l - 7 * m + 114) % 31) + 1;
	 return new Date(y, month - 1, day);
     }

     //before 2AM we still use schedule from previous day
     function getServiceDay(date = new Date(), cutoffHour = 2) {
	 const d = new Date(date);
	 if (d.getHours() < cutoffHour) {
	     d.setDate(d.getDate() - 1);
	 }
	 return d.getDay(); // 0 = sunday, 1 = monday, ...
     }
     
     //Calculate the current day type
     function getTodayType() {
	 //to be adapted each year (TODO: automatic)
	 //const holidayWeeks = [1, 9, 10, 18, 19, 28, 29, 30, 31, 32, 33, 34, 43, 44, 52]; //Belgium holiday weeks in 2025
	 const holidayWeeks = [
	     1,     // christmas, new year 2026
	     8, 9,  // carnaval 
	     18, 19,// easter
	     26,27,28,29,30,31,32,33,34, // summer holidays
	     44,45, // autumn
	     52,53  // christmas
	 ];
	 const today = new Date();
	 const dayOfWeek = getServiceDay();
	 const currentWeek = getISOWeekNumber(today);
	 const isHoliday = isPublicHoliday(today);
	 let suffix = holidayWeeks.includes(currentWeek) ? "_VAC" : "";
	 let dayType = "";
	 if (dayOfWeek === 0 || isHoliday) { // Dimanche holidays / not holidays ; legal public holidays
	     dayType = "DIM";
	 } else if (dayOfWeek === 6) { // Saturday
	     dayType = "SAM";
	 } else if (dayOfWeek === 3 && !holidayWeeks.includes(currentWeek)) { // Mercredi, wednesday in SEM during holidays
	     dayType = "MER";
	 } else dayType = "SEM"+suffix; // Default schedule for weekdays;
	 
	 console.log("Today is a: ",dayType);
	 return dayType;
     }

     // Dynamic load of the right schedule file based on day of the week, week number (holidays/regular), and geographical region
     async function loadScheduleFile_region(region, dayType) {
	 const key = `${region}_${dayType}`;
	 
	 if (loadedRegions.has(key)) return;
	 console.log("Start loading ", key);
	 
	 try {
	     const script = document.createElement("script");
	     script.src = `data/stop_times_${region}_${dayType}.js`;

	     await new Promise((resolve, reject) => {
		 script.onload = resolve;
		 script.onerror = reject;
		 document.head.appendChild(script);
	     });

	     // Le fichier JS contient la variable globale temporaire window.horairesChunk
	     Object.assign(horairesData, window.horairesChunk);
	     loadedRegions.add(key);

	 } catch (err) {
	     console.error("Erreur chargement région", region, err);
	 }
     }


   function parseDate(dateStr, timeStr = "00:00") {
       const [day, month, year] = dateStr.split(" ")[0].split("/");
       return new Date(`${year}-${month}-${day}T${timeStr}`);
   }

   // Sort alerts based on startTime and remove alerts that already happened (e.g. earlier in this day)
   function sortCleanAlerts(alerts) {
       const now = new Date();

       // First we filter old alerts related to cancellations when now is > endtime of a trip
       const futureAlerts = alerts.filter(alert => {
	   if (alert.starttime && alert.tripid && horairesData[alert.tripid]) {
	       const stops = horairesData[alert.tripid];
	       const lastStop = stops[stops.length - 1];
	       if (lastStop && lastStop.a) {
		   const endOfTrip = parseDate(alert.start, lastStop.a);
		   return endOfTrip >= now; // we keep it if trip not yet theoritically ended
	       }
	   }
	   if (alert.starttime) {
	       // fallback if no tripId was found in horairesData
	       const alertDate = parseDate(alert.start, alert.starttime);
	       return alertDate >= now;
	   }
	   // keep other alerts without starttime (stop moves, general info)
	   return true;
       });

       // Sorting
       return futureAlerts.sort((a, b) => {
	   // Case 1 : both have starttime
	   if (a.starttime && b.starttime) {
	       const dateA = parseDate(a.start, a.starttime);
	       const dateB = parseDate(b.start, b.starttime);
	       return dateA - dateB;
	   }
	   // Case 2 : only one has starttime, it goes first
	   if (a.starttime && !b.starttime) return -1;
	   if (!a.starttime && b.starttime) return 1;

	   // Case 3 : none has starttime -> sort using start date
	   const dateA = parseDate(a.start);
	   const dateB = parseDate(b.start);
	   return dateA - dateB;
       });
   }

   //Fill the side panel with alert data related to the routeId

   // Compute minutes sinces bus started (deprecated, not used anymore)
   function getTimeSinceStart(startTime) {
       const now = new Date(); // current time
       const currentDate = now.toISOString().split('T')[0];
       const fullStartTime = `${currentDate}T${startTime}`;
       const startDate = new Date(fullStartTime); // Convert startTime into Data object
       const differenceInMillis = now - startDate; // Difference in milliseconds
       const differenceInMinutes = Math.floor(differenceInMillis / 60000); // Convert in minutes
       return differenceInMinutes;
   }


   // Get readable stop name based on stopId (identifier in gtfs static)
   function getStopName(stopId, stopsMap) {
       if (stopId) {
	   return stopsMap[stopId] || "Arrêt inconnu";
       }
   }


   // Create a specific vehicle marker icon based on vehicle type and buscolor (based on delay)
   function makeVehicleIcon(bus, busColor) {
       const route = bus.trip.route_short_name;

       const icons = {
	   "tram": "fas fa-train-tram",     // Tram
	   "metro": "fas fa-train-subway",    // Métro
	   "default": "fas fa-bus"        // Bus normal
       };

       // Determine icon based on local knowledge of vehicle type
       let iconClass = icons.default;
       if (route === "T1") { //T1 in Liege is the tram
	   iconClass = icons.tram;
       } else if (["M1","M2","M3","M4","M5"].includes(route)) {  // in Charleroi
	   iconClass = icons.metro;
       }
       // Use of italic for express buses (E... in Wallonia)
       const numberStyle = route.startsWith("E") ? "font-style: italic;" : "";

       return L.divIcon({
	   html: `
	       <div class="bus-marker" style="border: 3px solid ${busColor};">
		   <i class="${iconClass}" style="color: ${busColor};"></i>
		   <span class="bus-number" style="${numberStyle}">${route}</span>
	       </div>
	   `,
	   className: 'custom-bus-icon',
	   iconSize: [36, 36],
	   iconAnchor: [20, 20]
       });
   }

   // Call color function based on coloring mode
     function getBusColor(delay, speed, stopSequence) {
	 if (currentColorMode === COLOR_MODES.DELAY) {
	     return getBusDelayColor(delay,stopSequence);
	 } else if (currentColorMode === COLOR_MODES.SPEED) {
	     return getBusSpeedColor(speed);
	 }
	 return "gray"; // default value
     }
     
     function updateColorMode() {
	 const select = document.getElementById("colorModeSelect");
	 currentColorMode = select.value;
	 fetchRealTimeBusData(0);
     }
   
   
   // Outputs a color for vehicle icon based on speed (not used anymore but might be a future option to display speed map rather than delay map)
   function getBusSpeedColor(speed) {
       if (typeof speed !== "number" || isNaN(speed)) return "grey";
       else if (speed < 15) return "black";
       else if (speed >= 15 && speed <= 90) return "green";
       else return "limegreen";
   }

   // Outputs a color for vehicle based on delay
     function getBusDelayColor(delay,stopSequence) {
	 if (stopSequence > 1) {
	     if (delay > 0 && delay < 5) return "orange"; 
	     else if (delay >= 5) return "red";
	     else if (delay < 0) return "darkblue";
	     else return "green";
	 }
	 else if (stopSequence <= 1) {
	     if (delay > 0 && delay < 5) return "orange"; 
	     else if (delay >= 5) return "red";
	     else return "grey";
	 }
	 
     }

   // Convert UNIX timestamp UNIX into human-readable time
   function timestampToTime(timestamp) {
       const date = new Date(timestamp * 1000); // Convert in milliseconds
       const hours = date.getHours().toString().padStart(2, '0');
       const minutes = date.getMinutes().toString().padStart(2, '0');
       const seconds = date.getSeconds().toString().padStart(2, '0');
       return `${hours}:${minutes}:${seconds}`;
   }

   // Convert readable time into UNIX timestamp
   function timeToUnixTimestamp(timeStr, referenceDate = new Date()) {
       const [hours, minutes] = timeStr.split(":").map(Number);  //time is formatted HH:MM
       // Get reference readable date into timestamp and set specific time
       const date = new Date(referenceDate);
       date.setHours(hours, minutes, 0, 0);
       // Output Unix timestamp Unix in seconds
       return Math.floor(date.getTime() / 1000);
   }

   function timestampToDate(timestamp) {
       //const d = new Date(timestamp * 1000);
       const d = new Date(timestamp*1000);
       return d.toLocaleString('fr-BE', {
	   day: '2-digit', month: '2-digit',
	   hour: '2-digit', minute: '2-digit',
	   year: 'numeric'
       });
       return d;
   }
   
   // Compute delays based on current timestamp, static schedule, and next stops, estimation that only works for delay (no advance)
   function estimateDelay_deprecated(schedule,currentStopSequence,timestamp) {
       // Compare current time with planned time at next stop, delay=difference
       if (schedule[currentStopSequence-1])
	   return Math.round((timestamp - timeToUnixTimestamp(schedule[currentStopSequence-1].a))/60);
   }

   //Use GTFS-RT data to get delays
     function estimateDelay(tripId) {
	 return delayByTrip[tripId] ?? 0;
	 //return(delayByTrip[tripId]);
     }

   // Human-readable first stop name of a trip
   function getStartPoint(tripId) {
       const schedule = horairesData[tripId]; // horairesData loaded with stop ids
       if (schedule)
	   return getStopName(schedule[0].s,stopsData)  //s = stopId
       else return " "
   }

   // Human-readable, cleaned last stop name (terminus) of a trip
   function getEndPoint(tripId) {
	 const schedule = horairesData[tripId]; // horairesData loaded with stop ids
	 if (schedule) {
	     let cleaned = getStopName(schedule[(schedule.length)-1].s,stopsData);
	     cleaned = cleaned.replace('(terminus)', '');
	     cleaned = cleaned.replace(/\s*terminus$/i, '');
	     cleaned = cleaned.replace(/\s*-\s*Quai\s+\w+/i, '');
	     return cleaned.trim();
	 }
	 else return " "
     }
     
     //Make string delay with brackets and sign
     function printDelay(delay) {
	 let strDelay = '';
	 if (delay > 0) strDelay = '(+'+delay+')';
	 else if (delay < 0) strDelay = '('+delay+')'; //delay is negative
	 return strDelay;
     }

   //Returns string with extract sheduled time at precise stop + delay
   function getStopTimeString(schedule,currentStopSequence,delay,filterStop) {
       let output = "";
       if (schedule) {
	   schedule.slice(currentStopSequence-1,schedule.length).forEach(entry => {  // we slice the schedule to reduce search in remaining stops
	       const stopName = getStopName(entry.s,stopsData);
	       if (stopName.toLowerCase().includes(filterStop.toLowerCase())) {
		   output = `${stopName} ${entry.a.slice(0, 5)} <span style="color: ${getBusDelayColor(delay,currentStopSequence)}; font-weight: bold;">${printDelay(delay)}</span>`;
	       }
	   }
	   )
       }
       return output;
   }

   }
   function getRouteShortName(routeId) {
       route = routeData[routeId];
       return route ? route.rsn : " ";

     // Generic function to load GTFS protobuf
     async function loadGTFSProtobuf(url) {
	 try {
           const response = await fetch(url);
           const buffer = await response.arrayBuffer();
           const root = await protobuf.load("data/gtfs-realtime.proto");  // Charger le .proto
           const FeedMessage = root.lookupType("transit_realtime.FeedMessage");
           const message = FeedMessage.decode(new Uint8Array(buffer));
           //console.log("GTFS Data in load:", FeedMessage.toObject(message));
           return FeedMessage.toObject(message);
       } catch (error) {
           console.error("Erreur lors du chargement du GTFS Protobuf :", error);
       }
   }

   async function waitForHorairesData(timeout = 20000, interval = 100) {
       return new Promise((resolve, reject) => {
           const startTime = Date.now();

           const check = () => {
               //if (typeof horairesData !== "undefined") {
	       if (loadedRegions.size>0) { //first schedule region is loaded
                   resolve(horairesData);
               } else if (Date.now() - startTime > timeout) {
                   reject(new Error("Timeout: horairesData n'a pas été chargé à temps."));
               } else {
                   setTimeout(check, interval);
               }
           };

           check();
       });
   }

   // Function to map GTFS-RT alert data into alertsByRoute and alertsByStop objects
   function transformAlertGTFSData(gtfsData) {
       const entities = gtfsData.entity;
       //go through all entities (alerts)
       entities.forEach(entity => {
	   const alert = entity.alert;
	   if (!alert || !Array.isArray(alert.informedEntity)) return;

	   // French description if available
	   let description = alert.descriptionText?.translation?.find(t => t.language === 'fr-be')?.text 
			    || alert.descriptionText?.translation?.[0]?.text 
			    || '';

	   // When does the alert applies
	   let startDate = ' ';
	   let endDate = ' ';
	   if (alert.activePeriod) {
	       startDate = timestampToDate(alert.activePeriod[0].start);
	       endDate = timestampToDate(alert.activePeriod[0].end);
	   }

	   //extract and convert info from informedEntity for precise cancellation information
	   let additionalInfo = ' ';
	   let starttime = null;
	   let tripid=null;
	   if (alert.informedEntity){
	       const tripInfo = alert.informedEntity[0].trip;
	       if (tripInfo && tripInfo.tripId) {
		   tripid = tripInfo.tripId;
		   // no AM/PM info in informedEntity startTime so we preferrably use horairesData[][0] startTime
		   if (horairesData[tripInfo.tripId]) {
		       starttime=horairesData[tripInfo.tripId][0].a;
		   }
		   else { //but we might not have horairesData loaded (e.g. for wednesday when we are tuesday)
		       starttime=tripInfo.startTime;
		   }
		   additionalInfo = "Annulation du bus démarrant de "+getStartPoint(tripInfo.tripId)+" à "+starttime;
		   description = additionalInfo;
	       }
	   }
	   
	   const alertInfo = {
	       id: entity.id,
	       tripid: tripid,
	       description,
	       start: startDate,
	       end: endDate,
	       starttime: starttime,
	       stops: [],
	       //raw: alert  // raw alert data 
	   };

	   //first loop to add concerned stops in alertInfo array
	   alert.informedEntity.forEach(info => {
	       const { stopId } = info;
	       if (!alertInfo.stops.includes(stopId)) {
		   alertInfo.stops.push(stopId);
	       }
	   });
	   
	   //second loop (not optimized) for adding alerts in indexing structures
	   alert.informedEntity.forEach(info => {
	       const { routeId, stopId } = info;

	       // Indexation par route
	       if (routeId) {
		   //console.log(routeId);
		   if (!alertsByRoute[routeId]) alertsByRoute[routeId] = [];
		   if (!alertsByRoute[routeId].some(a => a.id === alertInfo.id)) {
		       alertsByRoute[routeId].push(alertInfo);
		   }
	       }
	       // Indexation par arrêt // not needed anymore ?
	       if (stopId) {
		   if (!alertsByStop[stopId]) alertsByStop[stopId] = [];
		   if (!alertsByStop[stopId].some(a => a.id === alertInfo.id)) {
		       alertsByStop[stopId].push(alertInfo);
		   }
	       }
	   });
       });
   }

   function transformUpdateGTFSData(gtfsData, computeStats = false) {
       const entities = gtfsData.entity;
       statsByRoute = {}; //reinitialize statsByRoute
       //go through all entities (alerts)
       entities.forEach(entity => {
	   const tripUpdate = entity.tripUpdate;
	   if (!tripUpdate || !tripUpdate.trip || !tripUpdate.vehicle) return;
	   const tripId = tripUpdate.trip.tripId;
	   const routeId = tripUpdate.trip.routeId;
	   let delay = 0;
	   if (typeof tripUpdate.delay === "number") {
	       delay = Math.round(tripUpdate.delay/60); // in minutes
	       delayByTrip[tripId] = delay;
	   }

	   // if we compute stats
	   if (computeStats && routeId && delay != null) {
	       if (!statsByRoute[routeId]) {
		   statsByRoute[routeId] = {
		       totalDelay: 0,
		       count: 0,
		       lateCount: 0,
		       advanceCount: 0
		   };
	       }
	       const s = statsByRoute[routeId];
	       s.totalDelay += delay;
	       s.count++;
	       if (delay > 0) s.lateCount++;
	       if (delay < 0) s.advanceCount++;
	   }
       }); //end of entities
       
       // if we computestats, compute avgDelay for each route
       if (computeStats) {
	   Object.keys(statsByRoute).forEach(routeId => {
	       const s = statsByRoute[routeId];
	       s.avgDelay = s.count > 0 ? s.totalDelay / s.count : 0;
	       s.color = getBusDelayColor(s.avgDelay); // store color for panel display
	   });
	   //return { delayByTrip, statsByRoute };
       }
       //return { delayByTrip };
   }

	 NAM: L.latLngBounds([
	     [50.3, 4.7],
	     [50.6, 5.2]
	 ]),
	 // Brabant Wallon (au nord de Namur / Charleroi)
	 BW: L.latLngBounds([
	     [50.5, 4.2],
	     [50.9, 4.7]
	 ]),
	 // Hainaut (ouest de Charleroi)
	 H: L.latLngBounds([
	     [49.9, 3.5],
	     [50.6, 4.3]
	 ]),
	 // Luxembourg (province du sud)
	 LUX: L.latLngBounds([
	     [49.4, 4.8],
	     [50.3, 5.9]
	 ])
     };


     //when panning, check the current location and load region data accordingly
     map.on("moveend", async () => {
	 const bounds = map.getBounds();
	 for (const region in regionsBounds) {
	     if (bounds.intersects(regionsBounds[region])) {
		 await loadScheduleFile_region(region, currentDayType);
	     }
	 }
     });

     
     // Load realtime data (3 sources: updates, vehicles, alerts)
     // Refresh update data every RT_REFRESH_RATE seconds
     fetchRealTimeUpdateData();
     setInterval(fetchRealTimeUpdateData, RT_REFRESH_RATE);
     // Refresh vehicle position data every RT_REFRESH_RATE seconds
     fetchRealTimeBusData();
     scheduleNextFetch();
     //setInterval(fetchRealTimeBusData, RT_REFRESH_RATE);
     // Fetch alerts only once for the session
     fetchRealTimeAlertData(); 
     
     document.getElementById('close-side-btn').addEventListener('click', () => {
       document.getElementById('side-panel').classList.remove('open');
     });
   
  </script>
</body>
</html>
